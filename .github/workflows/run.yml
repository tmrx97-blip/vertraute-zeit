name: Automatisierte Analyse
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Tools installieren
        run: pip install pandas matplotlib
      - name: Analyse starten
        run: python analyse.py
      - name: Ergebnisse speichern
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Diagramme automatisch aktualisiert"
